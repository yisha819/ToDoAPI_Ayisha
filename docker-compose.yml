version: '3.8'

services:
  # 1. Your Node.js API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:mysecretpassword@postgres_db:5432/postgres?schema=public
    depends_on:
      postgres_db:
        condition: service_healthy

  # 2. Your PostgreSQL Database Service
  postgres_db:
    image: postgres:15-alpine
    container_name: todo-postgres-container
    environment:
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: